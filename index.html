<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌰 Regulatory Pulse — Crypto Regulation Intelligence</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060a14; --surface: #0d1424; --card: #111a2e; --border: #1e2a45;
      --text: #e8edf5; --muted: #6b7a99; --accent: #00d4aa; --accent-dim: #00d4aa22;
      --high: #ff6b6b; --high-bg: #ff6b6b22; --medium: #ffd93d; --medium-bg: #ffd93d22;
      --low: #6bcb77; --low-bg: #6bcb7722; --cyan: #4ecdc4;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
    
    /* Animated gradient background */
    body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 20% 20%, #00d4aa08 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, #4ecdc408 0%, transparent 50%); pointer-events: none; z-index: 0; }
    
    .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; position: relative; z-index: 1; }
    
    /* Navigation */
    nav { position: sticky; top: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.8rem 0; z-index: 100; backdrop-filter: blur(12px); }
    nav .container { display: flex; justify-content: space-between; align-items: center; padding: 0 1.5rem; }
    .logo { font-size: 1.3rem; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 0.5rem; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }
    .badge { background: var(--accent-dim); color: var(--accent); padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    
    /* Hero Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin: 1.5rem 0 2rem; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; text-align: center; position: relative; overflow: hidden; animation: fadeSlideIn 0.5s ease-out backwards; }
    .stat-card:nth-child(1) { animation-delay: 0.1s; }
    .stat-card:nth-child(2) { animation-delay: 0.2s; }
    .stat-card:nth-child(3) { animation-delay: 0.3s; }
    .stat-card:nth-child(4) { animation-delay: 0.4s; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--cyan)); }
    .stat-card .icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-card .label { font-size: 0.8rem; color: var(--muted); margin-top: 0.3rem; }
    
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Summary Card */
    .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; border-left: 4px solid var(--accent); animation: fadeSlideIn 0.5s ease-out 0.5s backwards; }
    .summary-card h2 { font-size: 1rem; color: var(--accent); margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
    .summary-card p { color: var(--text); font-size: 1.05rem; line-height: 1.7; }
    .summary-card .outlook { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); color: var(--cyan); font-size: 0.95rem; }
    
    /* Tabs */
    .tabs-container { margin-bottom: 2rem; animation: fadeSlideIn 0.5s ease-out 0.6s backwards; }
    .tabs { display: flex; gap: 0.5rem; background: var(--surface); padding: 0.4rem; border-radius: 10px; width: fit-content; }
    .tab { padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; color: var(--muted); transition: all 0.2s; border: none; background: transparent; }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--accent); color: var(--bg); font-weight: 600; }
    
    /* Events */
    .events-list { display: flex; flex-direction: column; gap: 1rem; }
    .event-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.3rem; transition: all 0.3s; animation: fadeSlideIn 0.4s ease-out backwards; }
    .event-card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 8px 30px rgba(0,212,170,0.1); }
    .event-card h3 { font-size: 1.05rem; margin-bottom: 0.5rem; }
    .event-meta { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.8rem; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    .badge-high { background: var(--high-bg); color: var(--high); }
    .badge-medium { background: var(--medium-bg); color: var(--medium); }
    .badge-low { background: var(--low-bg); color: var(--low); }
    .event-card a { color: var(--accent); text-decoration: none; }
    .event-card a:hover { text-decoration: underline; }
    .analysis { background: var(--surface); border-radius: 8px; padding: 1rem; margin-top: 0.8rem; font-size: 0.9rem; color: var(--muted); border-left: 3px solid var(--cyan); }
    
    .loading, .error { text-align: center; padding: 4rem; color: var(--muted); font-size: 1.1rem; }
    .error { color: var(--high); }
    
    /* Footer */
    footer { text-align: center; padding: 2rem 0; border-top: 1px solid var(--border); margin-top: 3rem; font-size: 0.85rem; color: var(--muted); }
    footer a { color: var(--accent); }
    
    /* Responsive */
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .nav-links { display: none; }
      .tabs { flex-wrap: wrap; width: 100%; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <div class="logo">🌰 Regulatory Pulse</div>
      <div class="nav-links">
        <a href="#" class="active">Dashboard</a>
        <a href="#events">Events</a>
        <a href="#analysis">Analysis</a>
      </div>
      <span class="badge" id="period-badge"></span>
    </div>
  </nav>
  
  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="icon">📊</div>
        <div class="value" id="total-events">—</div>
        <div class="label">Total Events</div>
      </div>
      <div class="stat-card">
        <div class="icon">⚠️</div>
        <div class="value" id="high-impact">—</div>
        <div class="label">High Impact</div>
      </div>
      <div class="stat-card">
        <div class="icon">🌍</div>
        <div class="value" id="jurisdictions">4</div>
        <div class="label">Jurisdictions</div>
      </div>
      <div class="stat-card">
        <div class="icon">🤖</div>
        <div class="value">AI</div>
        <div class="label">Analysis Ready</div>
      </div>
    </div>
    
    <div class="summary-card" id="summary-card">
      <h2>📋 Executive Summary</h2>
      <p id="summary-text">Loading regulatory intelligence...</p>
      <div class="outlook" id="outlook-text"></div>
    </div>
    
    <div class="tabs-container">
      <div class="tabs">
        <button class="tab active" data-jur="US">🇺🇸 United States</button>
        <button class="tab" data-jur="EU">🇪🇺 European Union</button>
        <button class="tab" data-jur="Asia">🌏 Asia-Pacific</button>
        <button class="tab" data-jur="Global">🌐 Global</button>
      </div>
    </div>
    
    <div class="events-list" id="events-list">
      <div class="loading">Loading events...</div>
    </div>
  </div>
  
  <footer>
    <p>Powered by <a href="https://rapidapi.com/CPWatch/api/cpw-tracker">CPW API</a> & <a href="https://docs.github.com/en/github-models">GitHub Models</a> 🌰</p>
    <p id="updated" style="margin-top: 0.5rem;"></p>
  </footer>
  
  <script>
    const JURISDICTIONS = [
      { key: 'US', label: 'United States', flag: '🇺🇸' },
      { key: 'EU', label: 'European Union', flag: '🇪🇺' },
      { key: 'Asia', label: 'Asia-Pacific', flag: '🌏' },
      { key: 'Global', label: 'Global', flag: '🌐' }
    ];
    
    let currentJurisdiction = 'US';
    let briefData = null;
    let eventsData = [];
    
    function impactBadge(level) {
      const l = (level || 'medium').toLowerCase();
      return `<span class="badge badge-${l}">${level || 'Medium'}</span>`;
    }
    
    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    
    function countHighImpact(brief) {
      if (!brief || !brief.by_jurisdiction) return 0;
      let count = 0;
      for (const j of Object.values(brief.by_jurisdiction)) {
        for (const item of j) {
          if (item.impact === 'High') count++;
        }
      }
      return count;
    }
    
    function renderEvents(jurisdiction) {
      const container = document.getElementById('events-list');
      if (!briefData || !briefData.by_jurisdiction) {
        container.innerHTML = '<div class="error">No data available</div>';
        return;
      }
      
      const items = briefData.by_jurisdiction[jurisdiction] || [];
      if (items.length === 0) {
        container.innerHTML = `<div class="event-card"><h3>No significant developments in ${jurisdiction}</h3></div>`;
        return;
      }
      
      let html = '';
      items.forEach((item, i) => {
        const matchingEvent = eventsData.find(e => e.title && item.headline && e.title.toLowerCase().includes(item.headline.toLowerCase().slice(0, 20)));
        html += `<div class="event-card" style="animation-delay: ${i * 0.1}s">
          <h3>${item.headline}</h3>
          <div class="event-meta">
            ${impactBadge(item.impact)}
            ${matchingEvent ? `<span>${matchingEvent.source || ''}</span><span>${formatDate(matchingEvent.timestamp)}</span>` : ''}
            ${matchingEvent && matchingEvent.url ? `<a href="${matchingEvent.url}" target="_blank">Source ↗</a>` : ''}
          </div>
          ${matchingEvent && matchingEvent.summary ? `<p style="font-size:0.9rem;color:var(--muted)">${matchingEvent.summary}</p>` : ''}
          ${item.analysis ? `<div class="analysis">🌰 <strong>Analysis:</strong> ${item.analysis}</div>` : ''}
        </div>`;
      });
      
      container.innerHTML = html;
    }
    
    function renderBrief() {
      if (briefData) {
        document.getElementById('total-events').textContent = briefData.events_analyzed || '—';
        document.getElementById('high-impact').textContent = countHighImpact(briefData);
        document.getElementById('period-badge').textContent = briefData.period || '';
        document.getElementById('summary-text').textContent = briefData.summary || 'No summary available';
        document.getElementById('outlook-text').textContent = briefData.outlook ? '📈 ' + briefData.outlook : '';
        document.getElementById('updated').textContent = briefData.generated_at ? 'Last updated: ' + formatDate(briefData.generated_at) : '';
      }
      renderEvents(currentJurisdiction);
    }
    
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentJurisdiction = tab.dataset.jur;
        renderEvents(currentJurisdiction);
      });
    });
    
    async function loadData() {
      try { eventsData = await (await fetch('data/events.json')).json(); } catch {}
      try { briefData = await (await fetch('data/brief.json')).json(); } catch {}
      
      if (!briefData && eventsData.length === 0) {
        document.getElementById('events-list').innerHTML = '<div class="error">No data available. Run the pipeline to fetch regulatory events.</div>';
        return;
      }
      renderBrief();
    }
    
    loadData();
  </script>
</body>
</html>
